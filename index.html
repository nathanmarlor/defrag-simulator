<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Microsoft Defrag for MS-DOS</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ── DOS Color Palette ──
const DOS_BLUE      = '#0000A8';
const DOS_WHITE     = '#A8A8A8';
const DOS_BRIGHT    = '#FFFFFF';
const DOS_RED       = '#FF0000';
const DOS_GREEN     = '#00AA00';
const DOS_YELLOW    = '#FFFF00';
const DOS_CYAN      = '#00AAAA';
const DOS_DARKGRAY  = '#545454';

// ── Cell states ──
const FREE = 0, SYSTEM = 1, FRAG = 2, CONTIG = 3;

// ── Block characters ──
const CH_FREE   = '░';  // U+2591 light shade
const CH_FRAG   = '▓';  // U+2593 dark shade
const CH_CONTIG = '█';  // U+2588 full block
const CH_SYSTEM = '█';
const CH_MOVING = '█';

// ── Character grid dimensions (computed at runtime) ──
let COLS, ROWS, cellW, cellH, fontSize;
let gridData, fileMap, fragFiles;
let moveQueue = [];
let movingCells = new Set();
let totalFragBlocks = 1, movedBlocks = 0;
let done = false, paused = false;
let flashOn = true;
let mapCol, mapRow, mapW, mapH;
let lastW = -1, lastH = -1;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  textFont('Courier New, Courier, monospace');
  noStroke();
  computeLayout();
  initDisk();
}

function computeLayout() {
  // Fit 80×25 text mode to viewport
  fontSize = constrain(floor(min(width / 81, height / 26.5)), 6, 24);
  textSize(fontSize);
  cellW = textWidth('X');
  cellH = fontSize * 1.25;

  COLS = floor(width / cellW);
  ROWS = floor(height / cellH);

  // Disk map bounds (character coordinates, 0-based)
  mapCol = 3;
  mapRow = 5;
  mapW = COLS - 8;
  mapH = ROWS - 12;
  if (mapW < 20) mapW = 20;
  if (mapH < 6) mapH = 6;
}

function initDisk() {
  gridData = new Array(mapH).fill(null).map(() => new Array(mapW).fill(FREE));
  fileMap = {};
  fragFiles = [];
  moveQueue = [];
  movingCells.clear();
  movedBlocks = 0;
  totalFragBlocks = 1;
  done = false;

  // System blocks (~6%)
  let sysCount = floor(mapW * mapH * 0.06);
  for (let i = 0; i < sysCount; i++) {
    let r = floor(random(mapH));
    let c = floor(random(mapW));
    if (gridData[r][c] === FREE) gridData[r][c] = SYSTEM;
  }

  // Place files
  let fileId = 0, placed = 0;
  let target = floor(mapW * mapH * 0.72);

  while (placed < target && fileId < 35) {
    let size = floor(random(4, max(5, floor(mapW * mapH / 80))));
    size = min(size, target - placed);
    if (size < 3) break;

    if (random() < 0.45) {
      // Fragmented
      let blocks = [], tries = 0;
      while (blocks.length < size && tries < 800) {
        let r = floor(random(mapH)), c = floor(random(mapW));
        if (gridData[r][c] === FREE) {
          gridData[r][c] = FRAG;
          blocks.push({r, c});
        }
        tries++;
      }
      if (blocks.length >= 3) {
        fileMap[fileId] = {blocks, contiguous: false};
        fragFiles.push(fileId);
        totalFragBlocks += blocks.length;
        placed += blocks.length;
        fileId++;
      }
    } else {
      // Contiguous
      let r = floor(random(mapH));
      let startC = floor(random(max(1, mapW - size)));
      let ok = startC + size <= mapW;
      for (let dc = 0; ok && dc < size; dc++)
        if (gridData[r][startC + dc] !== FREE) ok = false;
      if (ok) {
        let blocks = [];
        for (let dc = 0; dc < size; dc++) {
          gridData[r][startC + dc] = CONTIG;
          blocks.push({r, c: startC + dc});
        }
        fileMap[fileId] = {blocks, contiguous: true};
        placed += size;
        fileId++;
      }
    }
  }
  totalFragBlocks = max(totalFragBlocks, 1);
}

function findFreeRun(len) {
  for (let r = 0; r < mapH; r++) {
    let start = -1, run = 0;
    for (let c = 0; c < mapW; c++) {
      if (gridData[r][c] === FREE) {
        if (start === -1) start = c;
        run++;
        if (run >= len) return {r, c: start};
      } else { start = -1; run = 0; }
    }
  }
  return null;
}

function queueFileMove(fileId) {
  let blocks = fileMap[fileId].blocks;
  let dest = findFreeRun(blocks.length);
  if (!dest) return false;

  let sorted = [...blocks].sort((a, b) => a.c - b.c);
  for (let i = 0; i < sorted.length; i++) {
    moveQueue.push({
      fromR: sorted[i].r, fromC: sorted[i].c,
      toR: dest.r, toC: dest.c + i,
      fileId, phase: 0, timer: 0,
    });
  }
  return true;
}

function consolidateFree() {
  for (let fid in fileMap) {
    let f = fileMap[fid];
    if (!f.contiguous) continue;
    let blocks = f.blocks;
    let r = blocks[0].r;
    let gap = 0;
    for (let c = blocks[0].c - 1; c >= 0; c--) {
      if (gridData[r][c] === FREE) gap++; else break;
    }
    if (gap > 0) {
      for (let b of blocks) gridData[b.r][b.c] = FREE;
      for (let i = 0; i < blocks.length; i++) {
        let nc = blocks[i].c - gap;
        gridData[r][nc] = CONTIG;
        blocks[i] = {r, c: nc};
      }
    }
  }
}

function draw() {
  if (width !== lastW || height !== lastH) {
    lastW = width; lastH = height;
    computeLayout();
    initDisk();
  }

  // Flash toggle for read/write blocks
  flashOn = frameCount % 10 < 7;

  background(DOS_BLUE);
  textAlign(LEFT, TOP);
  textSize(fontSize);

  drawBorders();
  drawMenuBar();
  drawDriveInfo();
  drawDiskMap();
  drawLegend();
  drawStatusBar();

  if (!done && !paused) processMoves();
}

function chX(c) { return mapCol + c + 1; }
function chY(r) { return mapRow + r + 1 + 2; }  // +2 for the map border/header

function drawBorders() {
  fill(DOS_CYAN);
  textSize(fontSize);
  textAlign(LEFT, TOP);

  // Top double border
  let top = '╔' + '═'.repeat(COLS - 2) + '╗';
  text(top, 0, 0);

  // Bottom double border
  let bot = '╚' + '═'.repeat(COLS - 2) + '╝';
  text(bot, 0, (ROWS - 1) * cellH);

  // Side borders
  for (let r = 1; r < ROWS - 1; r++) {
    text('║', 0, r * cellH);
    text('║', (COLS - 1) * cellW, r * cellH);
  }

  // Single-line border around disk map
  let mLeft = mapCol * cellW;
  let mTop = (mapRow + 1) * cellH;
  let mRight = (mapCol + mapW + 1) * cellW;
  let mBot = (mapRow + mapH + 2) * cellH;

  fill(DOS_CYAN);
  // Top of map border
  text('┌' + '─'.repeat(mapW) + '┐', mLeft, mTop);
  // Bottom of map border
  text('└' + '─'.repeat(mapW) + '┘', mLeft, mBot);
  // Sides
  for (let r = 0; r < mapH; r++) {
    text('│', mLeft, mTop + (r + 1) * cellH);
    text('│', mRight, mTop + (r + 1) * cellH);
  }
}

function drawMenuBar() {
  fill(DOS_WHITE);
  textAlign(LEFT, TOP);
  textSize(fontSize);

  let y = cellH;
  let items = '  Optimize  Configure  Help';
  text(items, cellW, y);

  // Underline shortcut letters
  fill(DOS_BRIGHT);
  text('O', cellW + 2 * cellW, y);
  text('C', cellW + 12 * cellW, y);
  text('H', cellW + 23 * cellW, y);
}

function drawDriveInfo() {
  fill(DOS_BRIGHT);
  textSize(fontSize);
  textAlign(LEFT, TOP);

  let y = cellH * 3;
  let info = '  Cluster 2' + ' '.repeat(mapW - 20) + (mapW * mapH);
  text(info, (mapCol + 1) * cellW, y);
}

function drawDiskMap() {
  textSize(fontSize);
  textAlign(LEFT, TOP);

  let x0 = (mapCol + 1) * cellW;
  let y0 = (mapRow + 2) * cellH;

  // Draw the grid as text characters
  let lineBuf = new Array(mapW);

  for (let r = 0; r < mapH; r++) {
    for (let c = 0; c < mapW; c++) {
      let key = r + ',' + c;

      if (movingCells.has(key) && flashOn) {
        lineBuf[c] = {ch: CH_MOVING, clr: DOS_YELLOW};
        continue;
      }

      switch (gridData[r][c]) {
        case FREE:
          lineBuf[c] = {ch: CH_FREE, clr: DOS_DARKGRAY};
          break;
        case SYSTEM:
          lineBuf[c] = {ch: CH_SYSTEM, clr: DOS_GREEN};
          break;
        case FRAG:
          lineBuf[c] = {ch: CH_FRAG, clr: DOS_RED};
          break;
        case CONTIG:
          lineBuf[c] = {ch: CH_CONTIG, clr: DOS_BRIGHT};
          break;
      }
    }

    // Render each cell individually for color accuracy
    for (let c = 0; c < mapW; c++) {
      fill(lineBuf[c].clr);
      text(lineBuf[c].ch, x0 + c * cellW, y0 + r * cellH);
    }
  }
}

function drawLegend() {
  let y = (mapRow + mapH + 3) * cellH;
  let x = (mapCol + 1) * cellW;
  textSize(fontSize);
  textAlign(LEFT, TOP);

  // Line 1
  fill(DOS_BRIGHT);  text('█', x, y);
  fill(DOS_WHITE);   text(' - Used    ', x + cellW, y);
  fill(DOS_DARKGRAY); text('░', x + 12*cellW, y);
  fill(DOS_WHITE);   text(' - Unused    ', x + 13*cellW, y);
  fill(DOS_RED);     text('▓', x + 27*cellW, y);
  fill(DOS_WHITE);   text(' - Fragmented', x + 28*cellW, y);

  // Line 2
  y += cellH;
  fill(DOS_GREEN);   text('█', x, y);
  fill(DOS_WHITE);   text(' - System    ', x + cellW, y);
  fill(DOS_YELLOW);  text('█', x + 14*cellW, y);
  fill(DOS_WHITE);   text(' - Read/Write   ', x + 15*cellW, y);
  if (done) {
    fill(DOS_GREEN);
    text('Done!', x + 35*cellW, y);
  }
}

function drawStatusBar() {
  let y = (ROWS - 2) * cellH;
  let x = cellW;
  let pct = floor((movedBlocks / max(totalFragBlocks, 1)) * 100);

  textSize(fontSize);
  textAlign(LEFT, TOP);

  // Progress bar using block chars
  let barW = 20;
  let doneW = floor(pct / 100 * barW);
  fill(DOS_BRIGHT);
  text('█'.repeat(doneW), x, y);
  fill(DOS_DARKGRAY);
  text('░'.repeat(barW - doneW), x + doneW * cellW, y);

  // Percentage
  fill(DOS_BRIGHT);
  text(' ' + pct + '% complete', x + (barW + 1) * cellW, y);

  // Esc to stop
  if (!done) {
    fill(DOS_WHITE);
    let esc = 'Esc=Stop';
    text(esc, (COLS - esc.length - 1) * cellW, y);
  } else {
    fill(DOS_YELLOW);
    let dn = 'Tap to restart';
    text(dn, (COLS - dn.length - 1) * cellW, y);

    // Blinking cursor
    if (frameCount % 40 < 20) {
      fill(DOS_BRIGHT);
      text('█', (COLS - 1) * cellW, y);
    }
  }
}

function processMoves() {
  if (done) return;
  movingCells.clear();

  if (moveQueue.length === 0) {
    if (fragFiles.length === 0) { done = true; return; }
    let fid = fragFiles.shift();
    if (!queueFileMove(fid)) {
      consolidateFree();
      if (fragFiles.length > 0) {
        queueFileMove(fragFiles.shift());
      } else {
        done = true;
      }
    }
    return;
  }

  let mv = moveQueue[0];
  switch (mv.phase) {
    case 0:
      mv.phase = 1; mv.timer = 3;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      break;
    case 1:
      mv.timer--;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      if (mv.timer <= 0) {
        gridData[mv.fromR][mv.fromC] = FREE;
        mv.phase = 2; mv.timer = 3;
        movingCells.add(mv.toR + ',' + mv.toC);
      }
      break;
    case 2:
      mv.timer--;
      movingCells.add(mv.toR + ',' + mv.toC);
      if (mv.timer <= 0) {
        gridData[mv.toR][mv.toC] = CONTIG;
        fileMap[mv.fileId].blocks = fileMap[mv.fileId].blocks.map(b =>
          (b.r === mv.fromR && b.c === mv.fromC) ? {r: mv.toR, c: mv.toC} : b
        );
        fileMap[mv.fileId].contiguous = true;
        moveQueue.shift();
        movedBlocks++;
      }
      break;
  }
}

function mousePressed() { initDisk(); }
function keyPressed() {
  if (key === ' ' || key === 'p') { paused = !paused; return; }
  initDisk();
}
function touchStarted() { initDisk(); return false; }
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  computeLayout();
  initDisk();
}
</script>
</body>
</html>
