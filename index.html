<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disk Defragmenter</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      background: #008080;
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ── Grid config ──
const COLS = 50;
const ROWS = 28;
const CELL = 11;
const GAP = 1;
const CSIZE = CELL + GAP;

// ── Colors (Windows 95 defrag palette) ──
const CLR = {
  free:       '#D4D4D4',
  system:     '#0000A0',
  fragmented: '#E00000',
  contiguous: '#2090FF',
  moving:     '#FFE800',
  justMoved:  '#00D828',
};

// ── Cell states ──
const FREE = 0, SYSTEM = 1, FRAG = 2, CONTIG = 3;

// Lookup table for move flash
const movingCells = new Set();

// ── Globals ──
let grid, fileMap, fragFiles, systemBlocks;
let gridX, gridY;
let moveQueue = [];
let moveTimer = 0;
let totalFragBlocks = 0;
let movedBlocks = 0;
let done = false;
let elapsedFrames = 0;

// ── p5 ──
function setup() {
  let c = createCanvas(760, 560);
  pixelDensity(1);
  frameRate(30);
  noStroke();
  textFont('monospace');

  gridX = 25;
  gridY = 90;
  initDisk();
}

function initDisk() {
  grid = new Array(ROWS).fill(null).map(() => new Array(COLS).fill(FREE));
  fileMap = {};
  fragFiles = [];
  systemBlocks = [];
  moveQueue = [];
  moveTimer = 0;
  movedBlocks = 0;
  done = false;
  elapsedFrames = 0;

  // Place system blocks (~8% scattered)
  let sysCount = floor(ROWS * COLS * 0.08);
  for (let i = 0; i < sysCount; i++) {
    let r = floor(random(ROWS));
    let c = floor(random(COLS));
    if (grid[r][c] === FREE) {
      grid[r][c] = SYSTEM;
      systemBlocks.push({r, c});
    }
  }

  // Place files
  let fileId = 0;
  let remainingFree = ROWS * COLS - sysCount;
  let targetUsed = floor(remainingFree * 0.68);
  let placed = 0;

  while (placed < targetUsed && fileId < 25) {
    let size = floor(random(8, 35));
    size = min(size, targetUsed - placed);
    if (size < 3) break;

    // ~45% chance of being fragmented
    let isFrag = random() < 0.45;

    if (isFrag) {
      // Scatter blocks randomly
      let blocks = [];
      let attempts = 0;
      while (blocks.length < size && attempts < 500) {
        let r = floor(random(ROWS));
        let c = floor(random(COLS));
        if (grid[r][c] === FREE) {
          grid[r][c] = FRAG;
          blocks.push({r, c});
        }
        attempts++;
      }
      if (blocks.length >= 3) {
        fileMap[fileId] = {blocks, contiguous: false};
        fragFiles.push(fileId);
        totalFragBlocks += blocks.length;
        placed += blocks.length;
        fileId++;
      }
    } else {
      // Place contiguous
      let startR = floor(random(ROWS));
      let startC = floor(random(COLS - size));
      let canPlace = true;
      for (let dc = 0; dc < size; dc++) {
        if (startC + dc >= COLS || grid[startR][startC + dc] !== FREE) {
          canPlace = false; break;
        }
      }
      if (canPlace) {
        let blocks = [];
        for (let dc = 0; dc < size; dc++) {
          grid[startR][startC + dc] = CONTIG;
          blocks.push({r: startR, c: startC + dc});
        }
        fileMap[fileId] = {blocks, contiguous: true};
        placed += size;
        fileId++;
      }
    }
  }
  totalFragBlocks = max(totalFragBlocks, 1);
}

function findFreeRun(len) {
  for (let r = 0; r < ROWS; r++) {
    let runStart = -1, runLen = 0;
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === FREE) {
        if (runStart === -1) runStart = c;
        runLen++;
        if (runLen >= len) return {r, c: runStart, len};
      } else {
        runStart = -1; runLen = 0;
      }
    }
  }
  return null;
}

function queueFileMove(fileId) {
  let file = fileMap[fileId];
  let blocks = file.blocks;
  let size = blocks.length;
  let dest = findFreeRun(size);
  if (!dest) return false;

  // Sort blocks by column (leftmost first) to look like they're being gathered
  let sorted = [...blocks].sort((a, b) => a.c - b.c);

  for (let i = 0; i < size; i++) {
    moveQueue.push({
      fromR: sorted[i].r,
      fromC: sorted[i].c,
      toR: dest.r,
      toC: dest.c + i,
      fileId: fileId,
      phase: 0,  // 0=pending, 1=pick flash, 2=clear source, 3=place flash, 4=done
      timer: 0,
    });
  }
  return true;
}

function draw() {
  background(0, 128, 128);

  drawWindow();
  drawGrid();
  drawLegend();
  drawStatus();

  processMoves();
}

function drawWindow() {
  // Title bar
  fill(0, 0, 128);
  noStroke();
  rect(15, 20, width - 30, 26, 3);
  fill(255);
  textSize(12);
  textStyle(BOLD);
  textAlign(LEFT, CENTER);
  text('  Disk Defragmenter', 22, 33);

  // Close button
  fill(192, 192, 192);
  rect(width - 42, 23, 18, 18);
  fill(0);
  textAlign(CENTER, CENTER);
  textSize(11);
  textStyle(NORMAL);
  text('✕', width - 33, 32);

  // Window body
  fill(192, 192, 192);
  stroke(255);
  strokeWeight(1);
  rect(15, 45, width - 30, height - 65);
  stroke(128);
  rect(15, 45, width - 30, height - 65);

  // Inner border
  noStroke();
  fill(255);
  rect(18, 48, width - 36, height - 72);
  fill(192);
  rect(18, 48, width - 36, 2);
  rect(18, 48, 2, height - 72);

  // Menu-like area
  fill(212, 208, 200);
  rect(20, 52, width - 40, 22);

  // Drive label area
  fill(240, 240, 240);
  rect(22, 55, width - 44, 16);
  fill(0);
  textSize(10);
  textAlign(LEFT, CENTER);
  text('  Defragmenting Drive C:  —  ' + floor((movedBlocks / max(totalFragBlocks, 1)) * 100) + '% complete', 28, 63);
}

function drawGrid() {
  let x = gridX, y = gridY;
  let gw = COLS * CSIZE;
  let gh = ROWS * CSIZE;

  // Grid background (disk surface)
  fill(0, 0, 80);
  stroke(0, 0, 40);
  strokeWeight(1);
  rect(x - 2, y - 2, gw + 4, gh + 4);

  noStroke();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let key = r + ',' + c;
      if (movingCells.has(key)) {
        fill(CLR.moving);
        rect(x + c * CSIZE, y + r * CSIZE, CELL, CELL);
        continue;
      }
      let state = grid[r][c];
      let clr;
      switch (state) {
        case FREE:    clr = CLR.free; break;
        case SYSTEM:  clr = CLR.system; break;
        case FRAG:    clr = CLR.fragmented; break;
        case CONTIG:  clr = CLR.contiguous; break;
      }
      fill(clr);
      rect(x + c * CSIZE, y + r * CSIZE, CELL, CELL);
    }
  }
}

function drawLegend() {
  let lx = gridX;
  let ly = gridY + ROWS * CSIZE + 12;
  let items = [
    {clr: CLR.free, label: 'Free space'},
    {clr: CLR.system, label: 'Unmovable'},
    {clr: CLR.fragmented, label: 'Fragmented'},
    {clr: CLR.contiguous, label: 'Optimized'},
    {clr: CLR.moving, label: 'Moving'},
  ];

  noStroke();
  textAlign(LEFT, CENTER);
  textSize(9);
  for (let i = 0; i < items.length; i++) {
    let ix = lx + i * 115;
    fill(items[i].clr);
    rect(ix, ly, 10, 10);
    fill(0);
    text(' ' + items[i].label, ix + 14, ly + 5);
  }
}

function drawStatus() {
  let btnY = gridY + ROWS * CSIZE + 34;
  let btnX = width - 200;

  // Button bar
  let buttons = ['Stop', 'Pause', 'Legend'];
  for (let i = 0; i < buttons.length; i++) {
    let bx = btnX + i * 62;
    fill(212, 208, 200);
    stroke(255);
    strokeWeight(1);
    rect(bx, btnY, 56, 22);
    stroke(128);
    line(bx, btnY + 21, bx + 56, btnY + 21);
    line(bx + 55, btnY, bx + 55, btnY + 22);
    noStroke();
    fill(0);
    textAlign(CENTER, CENTER);
    textSize(10);
    text(buttons[i], bx + 28, btnY + 11);
  }

  // Progress bar
  noStroke();
  fill(255);
  rect(20, btnY + 4, 140, 14);
  fill(0, 0, 160);
  let pct = movedBlocks / max(totalFragBlocks, 1);
  rect(22, btnY + 6, 136 * pct, 10);

  // Block counter
  fill(0);
  textAlign(LEFT, CENTER);
  textSize(9);
  text(floor(pct * 100) + '%', 20, btnY - 10);
}

function processMoves() {
  if (done) return;
  elapsedFrames++;
  movingCells.clear();

  if (moveQueue.length === 0) {
    if (fragFiles.length === 0) {
      done = true;
      return;
    }
    let fid = fragFiles.shift();
    if (!queueFileMove(fid)) {
      if (fragFiles.length > 0) {
        fid = fragFiles.shift();
        queueFileMove(fid);
      } else {
        done = true;
      }
    }
    return;
  }

  let mv = moveQueue[0];

  switch (mv.phase) {
    case 0:
      mv.phase = 1;
      mv.timer = 3;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      break;
    case 1:
      mv.timer--;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      if (mv.timer <= 0) {
        grid[mv.fromR][mv.fromC] = FREE;
        mv.phase = 2;
        mv.timer = 3;
        movingCells.add(mv.toR + ',' + mv.toC);
      }
      break;
    case 2:
      mv.timer--;
      movingCells.add(mv.toR + ',' + mv.toC);
      if (mv.timer <= 0) {
        grid[mv.toR][mv.toC] = CONTIG;
        fileMap[mv.fileId].blocks = fileMap[mv.fileId].blocks.map(b =>
          (b.r === mv.fromR && b.c === mv.fromC) ? {r: mv.toR, c: mv.toC} : b
        );
        fileMap[mv.fileId].contiguous = true;
        moveQueue.shift();
        movedBlocks++;
      }
      break;
  }
}

function mousePressed() {
  // Restart on click
  initDisk();
}
</script>
</body>
</html>
