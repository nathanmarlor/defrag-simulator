<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MS-DOS Defrag</title>
  <script>p5.disableFriendlyErrors = true;</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script>
// ── Color palette (VGA text-mode inspired) ──
const BG   = '#000028';
const FG   = '#A8A8A8';
const FREE_CLR     = '#555555';
const SYSTEM_CLR   = '#0000FF';
const FRAG_CLR     = '#FF0000';
const CONTIG_CLR   = '#00AAAA';
const MOVING_CLR   = '#FFFF00';
const BORDER_CLR   = '#4488AA';

// ── Cell states ──
const FREE = 0, SYSTEM = 1, FRAG = 2, CONTIG = 3;

// ── Globals ──
let grid, fileMap, fragFiles;
let moveQueue = [];
let movingCells = new Set();
let totalFragBlocks = 1, movedBlocks = 0;
let done = false;
let COLS, ROWS, CELL, GAP, CSIZE;
let gridX, gridY;
let charW, charH, fontSize;
let lastW = 0, lastH = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  frameRate(30);
  noStroke();
  textFont('Courier New, Courier, monospace');

  computeLayout();
  initDisk();
}

function computeLayout() {
  // Calculate font size based on viewport
  fontSize = constrain(floor(min(width, height) / 42), 8, 18);
  textSize(fontSize);
  charW = textWidth('X');
  charH = fontSize * 1.2;

  // Reserve space for header (4 lines) and footer (5 lines)
  let headerH = charH * 4;
  let footerH = charH * 5;
  let availW = width - charW * 4;
  let availH = height - headerH - footerH - charH * 2;

  // Grid sizing
  CELL = constrain(floor(min(availW / 52, availH / 30)), 4, 14);
  GAP = CELL > 6 ? 1 : 0;
  CSIZE = CELL + GAP;

  COLS = floor(availW / CSIZE);
  ROWS = floor(availH / CSIZE);

  gridX = floor((width - COLS * CSIZE) / 2);
  gridY = floor(headerH + charH);
}

function initDisk() {
  grid = new Array(ROWS).fill(null).map(() => new Array(COLS).fill(FREE));
  fileMap = {};
  fragFiles = [];
  moveQueue = [];
  movingCells.clear();
  movedBlocks = 0;
  totalFragBlocks = 1;
  done = false;

  // System blocks (~8%)
  let sysCount = floor(ROWS * COLS * 0.08);
  for (let i = 0; i < sysCount; i++) {
    let r = floor(random(ROWS));
    let c = floor(random(COLS));
    if (grid[r][c] === FREE) grid[r][c] = SYSTEM;
  }

  // Place files
  let fileId = 0;
  let placed = 0;
  let targetUsed = floor(ROWS * COLS * 0.70);

  while (placed < targetUsed && fileId < 30) {
    let size = floor(random(6, 30));
    size = min(size, targetUsed - placed);
    if (size < 3) break;

    let isFrag = random() < 0.45;

    if (isFrag) {
      let blocks = [];
      let attempts = 0;
      while (blocks.length < size && attempts < 600) {
        let r = floor(random(ROWS));
        let c = floor(random(COLS));
        if (grid[r][c] === FREE) {
          grid[r][c] = FRAG;
          blocks.push({r, c});
        }
        attempts++;
      }
      if (blocks.length >= 3) {
        fileMap[fileId] = {blocks, contiguous: false};
        fragFiles.push(fileId);
        totalFragBlocks += blocks.length;
        placed += blocks.length;
        fileId++;
      }
    } else {
      let r = floor(random(ROWS));
      let startC = floor(random(max(1, COLS - size)));
      let ok = startC + size <= COLS;
      for (let dc = 0; ok && dc < size; dc++)
        if (grid[r][startC + dc] !== FREE) ok = false;
      if (ok) {
        let blocks = [];
        for (let dc = 0; dc < size; dc++) {
          grid[r][startC + dc] = CONTIG;
          blocks.push({r, c: startC + dc});
        }
        fileMap[fileId] = {blocks, contiguous: true};
        placed += size;
        fileId++;
      }
    }
  }
  totalFragBlocks = max(totalFragBlocks, 1);
}

function findFreeRun(len) {
  for (let r = 0; r < ROWS; r++) {
    let start = -1, run = 0;
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === FREE) {
        if (start === -1) start = c;
        run++;
        if (run >= len) return {r, c: start};
      } else { start = -1; run = 0; }
    }
  }
  return null;
}

function queueFileMove(fileId) {
  let blocks = fileMap[fileId].blocks;
  let dest = findFreeRun(blocks.length);
  if (!dest) return false;

  let sorted = [...blocks].sort((a, b) => a.c - b.c);
  for (let i = 0; i < sorted.length; i++) {
    moveQueue.push({
      fromR: sorted[i].r, fromC: sorted[i].c,
      toR: dest.r, toC: dest.c + i,
      fileId, phase: 0, timer: 0,
    });
  }
  return true;
}

function draw() {
  // Resize handling
  if (width !== lastW || height !== lastH) {
    lastW = width; lastH = height;
    computeLayout();
    initDisk();
  }

  background(BG);
  textAlign(LEFT, TOP);
  textSize(fontSize);

  drawHeader();
  drawGrid();
  drawLegend();
  drawFooter();

  processMoves();
}

function drawHeader() {
  let x = charW;
  let y = charH * 0.5;

  fill(FG);
  text('Microsoft Defrag for MS-DOS', x, y);
  text('Version 6.22', width - charW * 14, y);

  y += charH * 1.2;
  text('Cluster size = 2,048 bytes     Drive C:  ' + (ROWS * COLS) + ' clusters', x, y);

  y += charH * 1.2;
  let pct = floor((movedBlocks / max(totalFragBlocks, 1)) * 100);
  // Progress bar
  let barW = 30;
  let doneChars = floor(pct / 100 * barW);
  text('Progress: ', x, y);
  fill('#00AA00');
  let barStr = '█'.repeat(doneChars) + '░'.repeat(barW - doneChars);
  text(barStr, x + textWidth('Progress: '), y);
  fill(FG);
  text('  ' + pct + '%', x + textWidth('Progress: ') + textWidth(barStr), y);

  // Grid border
  y = gridY - charH * 0.3;
  stroke(BORDER_CLR);
  strokeWeight(1);
  noFill();
  rect(gridX - 2, gridY - 2, COLS * CSIZE + 4, ROWS * CSIZE + 4);
  noStroke();
}

function drawGrid() {
  let x = gridX, y = gridY;
  noStroke();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let key = r + ',' + c;
      let clr;
      if (movingCells.has(key)) {
        clr = MOVING_CLR;
      } else {
        switch (grid[r][c]) {
          case FREE:   clr = FREE_CLR; break;
          case SYSTEM: clr = SYSTEM_CLR; break;
          case FRAG:   clr = FRAG_CLR; break;
          case CONTIG: clr = CONTIG_CLR; break;
        }
      }
      fill(clr);
      rect(x + c * CSIZE, y + r * CSIZE, CELL, CELL);
    }
  }
}

function drawLegend() {
  let y = gridY + ROWS * CSIZE + charH;
  let x = charW;
  let items = [
    {clr: FREE_CLR,   label: 'Free'},
    {clr: SYSTEM_CLR, label: 'System'},
    {clr: FRAG_CLR,   label: 'Fragmented'},
    {clr: CONTIG_CLR, label: 'Optimized'},
    {clr: MOVING_CLR, label: 'Moving'},
  ];

  noStroke();
  textAlign(LEFT, TOP);
  let cx = x;
  for (let i = 0; i < items.length; i++) {
    fill(items[i].clr);
    rect(cx, y + 2, fontSize * 0.8, fontSize * 0.8);
    fill(FG);
    text(' ' + items[i].label + '  ', cx + fontSize, y);
    cx += textWidth(' ' + items[i].label + '  ') + fontSize;
  }
}

function drawFooter() {
  let y = height - charH * 2;
  let x = charW;

  fill(FG);
  textAlign(LEFT, BOTTOM);

  if (done) {
    fill('#00FF00');
    text('Defragmentation complete.  Press any key or tap to restart.', x, y);
  } else {
    text('F1=Help  F10=Exit  ESC=Stop Defrag', x, y);
  }

  // Blinking cursor
  if (done && frameCount % 40 < 20) {
    fill(FG);
    text('█', x + textWidth('Defragmentation complete.  Press any key or tap to restart.'), y);
  }
}

function processMoves() {
  if (done) return;
  movingCells.clear();

  if (moveQueue.length === 0) {
    if (fragFiles.length === 0) { done = true; return; }
    let fid = fragFiles.shift();
    if (!queueFileMove(fid)) {
      if (fragFiles.length > 0) {
        queueFileMove(fragFiles.shift());
      } else {
        // Try to consolidate free space: pick a contiguous file and "slide" it left
        consolidateFree();
        if (fragFiles.length === 0) { done = true; return; }
      }
    }
    return;
  }

  let mv = moveQueue[0];
  switch (mv.phase) {
    case 0:
      mv.phase = 1; mv.timer = 2;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      break;
    case 1:
      mv.timer--;
      movingCells.add(mv.fromR + ',' + mv.fromC);
      if (mv.timer <= 0) {
        grid[mv.fromR][mv.fromC] = FREE;
        mv.phase = 2; mv.timer = 2;
        movingCells.add(mv.toR + ',' + mv.toC);
      }
      break;
    case 2:
      mv.timer--;
      movingCells.add(mv.toR + ',' + mv.toC);
      if (mv.timer <= 0) {
        grid[mv.toR][mv.toC] = CONTIG;
        fileMap[mv.fileId].blocks = fileMap[mv.fileId].blocks.map(b =>
          (b.r === mv.fromR && b.c === mv.fromC) ? {r: mv.toR, c: mv.toC} : b
        );
        fileMap[mv.fileId].contiguous = true;
        moveQueue.shift();
        movedBlocks++;
      }
      break;
  }
}

function consolidateFree() {
  // Slide contiguous files left to consolidate free space at the right
  for (let fid in fileMap) {
    let f = fileMap[fid];
    if (!f.contiguous) continue;
    let blocks = f.blocks;
    // Find leftmost free space
    let minC = blocks[0].c;
    let gap = 0;
    for (let c = minC - 1; c >= 0; c--) {
      if (grid[blocks[0].r][c] === FREE) gap++;
      else break;
    }
    if (gap > 0) {
      // Move file left by gap
      let r = blocks[0].r;
      for (let b of blocks) grid[b.r][b.c] = FREE;
      for (let i = 0; i < blocks.length; i++) {
        let nc = blocks[i].c - gap;
        grid[r][nc] = CONTIG;
        blocks[i] = {r, c: nc};
      }
    }
  }
}

function mousePressed() { initDisk(); }
function keyPressed() { initDisk(); }
function touchStarted() { initDisk(); return false; }
function windowResized() { resizeCanvas(windowWidth, windowHeight); }
</script>
</body>
</html>
